env:
  PROJECT_NAME: "AgentOrchestration"
  NODE_VERSION: "20"

steps:
  # 1. Build and Test Stage
  - label: ":nodejs: Build & Verify"
    key: "build-and-test"
    commands:
      - "npm ci"
      - "npm run build --if-present"
      - "npm test --if-present"
    artifact_paths:
      - "dist/**/*"
      - "coverage/**/*"
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
    agents:
      queue: "default"

  - wait

  # 2. Security Stage
  - label: ":lock: Security Audit & Scan"
    key: "security"
    depends_on: "build-and-test"
    parallelism: 2
    commands:
      - "npm audit --audit-level=high"
      - "trivy fs . --severity HIGH,CRITICAL"
    agents:
      queue: "default"

  - label: ":terraform: Infrastructure Check"
    key: "iac-scan"
    depends_on: "build-and-test"
    commands:
      - "cd terraform && terraform init -backend=false && terraform validate"
      - "checkov -d terraform/ --quiet --soft-fail"
    agents:
      queue: "default"

  - wait

  # 3. Deployment Gates & Stages
  - label: ":rocket: Staging: Manual Approval"
    if: build.branch == "main"
    block: "🚀 Deploy to STAGING?"
    prompt: "Ready to deploy the Agent Orchestrator to stage?"

  - label: ":shipit: Deploy to Staging"
    key: "deploy-staging"
    depends_on: "iac-scan"
    if: build.branch == "main"
    concurrency_group: "staging-deployment"
    concurrency: 1
    commands:
      - "echo 'Deploying to staging environment...'"
      - "terraform -chdir=terraform apply -auto-approve"

  - wait

  # 4. Post-Deployment Verification
  - label: ":fire: Smoke Tests (Staging)"
    key: "smoke-tests"
    depends_on: "deploy-staging"
    commands:
      - "echo 'Verifying deployment with smoke tests...'"
      - "curl -f https://staging-agent-orchestrator.example.com/health || exit 1"

  - label: ":cypress: E2E Verification (Cypress/Playwright)"
    key: "e2e-tests"
    depends_on: "deploy-staging"
    commands:
      - "npm run test:e2e --if-present"
    retry:
      automatic:
        - exit_status: "*"
          limit: 1

  - wait

  # 5. Production Gate & Stage
  - label: ":white_check_mark: Production: Manual Gate"
    if: build.branch == "main"
    block: "🏢 Deploy to PRODUCTION?"
    prompt: "Staging verified. Final approval for production deployment?"

  - label: ":earth_americas: Deploy to Production"
    key: "deploy-prod"
    depends_on: ["deploy-staging", "smoke-tests", "e2e-tests"]
    if: build.branch == "main"
    concurrency_group: "prod-deployment"
    concurrency: 1
    commands:
      - "echo 'Deploying to production environment...'"
      - "terraform -chdir=terraform apply -auto-approve"

  - wait

  # 6. Automated Release & Notifications
  - label: ":rocket: Semantic Release & Tagging"
    key: "release"
    depends_on: "deploy-prod"
    if: build.branch == "main"
    commands:
      - "npm run release --if-present"
      - "echo 'Build successfully released! Sending Slack notification...'"
    agents:
      queue: "default"
